name: sshido
options:
  bundleIdPrefix: com.sshido
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_COMPILATION_MODE: wholemodule

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel
    from: 0.12.0
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: 1.2.0
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.0.0

targets:
  sshido:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ../Sources/Models
      - path: ../Sources/Core
      - path: ../Sources/UI
      - path: ../Sources/AppUI
        excludes:
          - Info.plist
          - sshido.entitlements
    dependencies:
      - package: Citadel
        product: Citadel
      - package: SwiftTerm
        product: SwiftTerm
      - package: Sentry
        product: Sentry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(BUNDLE_ID)
        INFOPLIST_FILE: ../Sources/AppUI/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: $(CODE_SIGN_STYLE)
        DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
        CODE_SIGN_ENTITLEMENTS: ../Sources/AppUI/sshido.entitlements
        OTHER_CODE_SIGN_FLAGS: --generate-entitlement-der
        ENABLE_HARDENED_RUNTIME: NO
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: ../Sources/AppUI/sshido.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: ../Sources/AppUI/sshido.Release.entitlements
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
